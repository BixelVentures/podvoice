# =============================================================================
# podvoice.yaml — PodVoice Voice PE firmware (THIN OVERLAY)
# =============================================================================
#
# This is the MAINTAINABLE replacement for the old copy-pasted voice-pe.yaml sketch.
# Per the engineering review (4-expert synthesis): inherit the official firmware as a
# pinned remote `packages:` include and express PodVoice's changes as small overrides,
# so board/pin/audio-graph drift is absorbed automatically on the next ref bump.
#
# WHAT THIS FILE DOES NOT DO YET:
#   The continuous-audio mechanism (Spike S1) is the `podvoice_audio` external_component
#   — added in Phase 1a, ONLY after run_s1/run_s2/AEC pass on real hardware. It is
#   commented out below. This overlay alone flashes a stock-equivalent device plus the
#   PSK + wake->event redirect, which is enough to run the Connection check.
#
# GATE before flashing (do this once): `esphome config podvoice.yaml` must render clean.
#   The rendered-config DIFF vs upstream is your early warning if an upstream id was
#   renamed (which would make an !extend/!remove silently no-op).
# =============================================================================

substitutions:
  name: podvoice-pe
  friendly_name: PodVoice PE
  # Pin the upstream firmware ref here; bump deliberately (see the update ritual in DOCS).
  ha_voice_ref: "26.6.0" # pin to the upstream release matching your ESPHome (2026.6.x)

# Inherit the ENTIRE official firmware (board, PSRAM, i2s pins, mic, speaker+mixer+
# resampler, AIC3204 DAC, LEDs, rotary, button, mute, micro_wake_word, voice_kit/XMOS,
# sdkconfig, on_boot). We never copy these — they ride the ref.
packages:
  ha_voice:
    url: https://github.com/esphome/home-assistant-voice-pe
    files: [home-assistant-voice.yaml]
    ref: ${ha_voice_ref}
    # NOT `never`: refresh:never serves a STALE cached base even when ha_voice_ref
    # changes (this caused the 26.4.0 esphome-const clash on a 26.6.x host). 1d picks
    # up a ref bump within a day; do "Clean Build Files" once after changing the ref.
    refresh: 0s

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

# --- PodVoice overrides (kept tiny so upstream updates re-merge cheaply) -------------

# API encryption with the PodVoice Noise PSK. The SAME value goes in the add-on's
# Settings -> Voice PE PSK. (A local !secret works here; this file is not a remote pkg.)
api:
  encryption:
    key: !secret podvoice_api_key # VERIFY: define podvoice_api_key in ESPHome secrets
  # Wake-gating control plane: PodVoice flips forwarding on/off over the native API.
  # start doubles as the dead-man keepalive (PodVoice re-asserts it while a session
  # is active; the device force-stops if it goes quiet — see podvoice_audio SAFETY_MS).
  # NOTE: ESPHome 2026.x renamed `api: services:` -> `api: actions:` (confirmed on 2026.6.2).
  actions:
    - action: podvoice_stream_start
      then:
        - lambda: "id(pv_audio).start_streaming();"
    - action: podvoice_stream_stop
      then:
        - lambda: "id(pv_audio).stop_streaming();"

# B1 step 2a — the ISOLATED VA-output swap (and NOTHING else; the 0.67 firmware bundled
# this with a mww automation + a stream-info lambda and broke wake — this flash isolates
# which change was the culprit). Package maps merge key-by-key: `!remove` deletes the
# upstream `media_player:` key (cv.Exclusive with `speaker:`), and the VA's output
# becomes the announcement resampler. Effects:
#   - wake path UNCHANGED (mww -> voice_assistant.start -> handle_start -> add-on),
#   - the announce/FLAC reply path UNCHANGED (the external_media_player ENTITY remains;
#     only VA-internal announce requests go away, which we never used),
#   - the direct PCM path becomes POSSIBLE (client-driven TTS events + audio frames),
#     but the add-on keeps it disabled until this flash is wake-validated.
voice_assistant:
  media_player: !remove
  speaker: announcement_resampling_speaker

# Upstream ships wifi via improv provisioning (no hard-coded network); a headless
# PodVoice flash needs credentials, so merge them in from secrets.yaml.
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Redirect on-device wake-word + center single-press to a PodVoice event the add-on
# subscribes to, instead of starting the HA Assist pipeline.
event:
  - platform: template
    id: podvoice_event
    name: "PodVoice event"
    device_class: button
    event_types: [single_press, double_press, triple_press, long_press, wake_okay_nabu, wake_stop]

# --- Phase 1a: the continuous-audio shim (the ONE custom C++ piece) ------------------
#   Taps the already-free-running mic (micro_wake_word keeps i2s_mics running with
#   stop_after_detection:false) via a *passive* MicrophoneSource -> PSRAM ring buffer
#   -> drains from loop() as VoiceAssistantAudio over the native API connection PodVoice
#   already holds (it subscribed via subscribe_voice_assistant). NOT start_continuous,
#   NOT a voice_assistant.cpp fork. Same wire message: diag.py run_s1 needs NO change;
#   voicepe.py's _handle_audio was fixed to the real (data, data2) callback shape.
#
#   DURING DEVELOPMENT this points at the in-repo component (local path). Once S1/S2/AEC
#   pass on hardware, move it to its OWN pinned repo (BixelVentures/podvoice-esphome) and
#   switch `source` to the git form below; bump that ref deliberately with the ESPHome +
#   package refs (the update ritual).
#
external_components:
  # GIT (default — so you only need THIS one file in ESPHome; the component is fetched
  # automatically from the PodVoice repo under esphome/components/podvoice_audio/).
  # During the S1 hardware-iteration loop we point at `main` with refresh:0s so a
  # re-Install always pulls the latest fix — you change nothing on your side.
  - source:
      type: git
      url: https://github.com/BixelVentures/podvoice
      ref: main
    components: [podvoice_audio]
    refresh: 0s   # dev: always re-fetch. PIN to a tag/SHA + refresh:never for production.
  # Local alternative (only if you copied the repo's esphome/ folder into /config/esphome):
  # - source: { type: local, path: components }
  #   components: [podvoice_audio]

podvoice_audio:
  id: pv_audio  # referenced by the api: services above (start/stop forwarding)
  # The `microphone:` sub-block IS the ESPHome microphone_source schema (same shape
  # voice_assistant uses). Short form `microphone: i2s_mics` also works.
  microphone:
    microphone: i2s_mics   # upstream Voice PE mic id (i2s_audio, 16 kHz, 32-bit stereo)
    channels: [0]          # channel 0 = XMOS-processed (AEC'd) mic; mww uses channel 1
    gain_factor: 1         # extra digital gain (1..64); raise only if levels are low.
                           # (gain lives HERE, inside the source block — there is no
                           #  separate top-level gain_factor key.)
    # bits_per_sample is pinned to 16 by the component (VoiceAssistantAudio carries L16);
    # the MicrophoneSource truncates the mic's native 32-bit samples for us.
  ring_ms: 400             # fixed PSRAM jitter buffer (~12.8 KB @ 16 kHz/16-bit/mono)
