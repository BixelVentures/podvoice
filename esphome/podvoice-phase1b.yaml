# =============================================================================
# podvoice-phase1b.yaml — WAKE-GATED FULL-DUPLEX (no !extend)
# =============================================================================
# !extend is unusable in ESPHome 2026.6.2 (mangled to a literal everywhere). This
# achieves full-duplex WITHOUT it:
#   - podvoice_audio = the continuous mic stream (full-duplex), wake-gated (boots OFF).
#   - Wake (Okay Nabu) -> upstream calls voice_assistant.start -> PodVoice receives
#     handle_start = the WAKE SIGNAL (no !extend needed).
#   - PodVoice then calls podvoice_va_abort (api action -> voice_assistant.stop) so the
#     stock turn-audio stops and does NOT collide with podvoice_audio, then starts our
#     stream (podvoice_stream_start). Only podvoice_audio flows -> clean full-duplex.
#   - Grace expiry -> podvoice_stream_stop (back to wake-only; privacy).
# All keys are normal ESPHome (NO !extend), so the Builder won't mangle them.
# Edit in the raw-YAML ({ }) view; never open the visual section editor.
# =============================================================================

substitutions:
  name: podvoice-pe
  friendly_name: PodVoice PE
  ha_voice_ref: "26.6.0"

packages:
  ha_voice:
    url: https://github.com/esphome/home-assistant-voice-pe
    files: [home-assistant-voice.yaml]
    ref: ${ha_voice_ref}
    refresh: 0s

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret podvoice_api_key
  actions:
    - action: podvoice_stream_start
      then:
        - lambda: "id(pv_audio).start_streaming();"
    - action: podvoice_stream_stop
      then:
        - lambda: "id(pv_audio).stop_streaming();"
    # Abort the stock VA turn that wake triggers, so its turn-audio doesn't collide
    # with podvoice_audio. VERIFY: voice_assistant.stop may need id: va on this ref.
    - action: podvoice_va_abort
      then:
        - voice_assistant.stop:

external_components:
  - source:
      type: git
      url: https://github.com/BixelVentures/podvoice
      ref: main
    components: [podvoice_audio]
    refresh: 0s

podvoice_audio:
  id: pv_audio
  microphone:
    microphone: i2s_mics
    channels: [0] # channel 0 = XMOS-AEC mic
  ring_ms: 400
  # autostart NOT set -> wake-gated: boots OFF, PodVoice starts it on wake.
