# =============================================================================
# voice_assistant -- PodVoice section 4.2 (THE CORE PLACEHOLDER)
# =============================================================================
#
#   *** PHASE-1 SPIKE S1 DELIVERABLE -- THIS IS NOT A STOCK FEATURE ***
#
# PodVoice needs a CONTINUOUS, gap-free 16 kHz raw-PCM stream to an external
# aioesphomeapi client (the add-on). The stock voice_assistant component streams
# mic audio ONLY during an active pipeline run (between start and run-end);
# streaming halts on VAD-end / run-end. There is NO confirmed stock path that
# streams gap-free continuous audio to an external client. This block is the
# anchor PodVoice builds that mechanism around -- but the mechanism itself is a
# Phase-1 hardware spike, NOT something this YAML can finish.
#
# Candidate mechanisms (PLAN 4.2 -- pick via Spike S1, then wire it up here):
#   Option A -- voice_assistant.start_continuous + re-arm. Lowest effort, but
#     "continuous" = auto-restart after a response, NOT stream-forever; it still
#     routes through the pipeline state machine, producing GAPS when the user
#     stops talking. Good for a plumbing spike; NOT the primary path.
#   Option C (leading candidate) -- keep the voice_assistant API-audio transport
#     but PATCH firmware so it does NOT stop on VAD-end / run-end (hold the
#     STREAMING_MICROPHONE state). Smallest fork; max reuse of i2s capture + API
#     framing. Requires an external_component / firmware patch.
#   Option B -- a custom mic consumer (microphone.on_data listener or custom
#     component) that pushes every frame unconditionally. No stock "stream
#     arbitrary bytes to a native-API client" message exists, so this is either
#     B1 (reuse the VA API-audio send path gated on our own flag) or B2 (a
#     separate TCP/UDP side channel from a custom component).
#
# Spike S1 EXIT CRITERIA (PLAN 4.2): sustained gap-free 16 kHz / 16-bit / mono
# PCM at the add-on for >10 min, with the GPIO3 mute correctly zeroing/stopping
# the stream. Pick the mechanism, THEN finish this block + any external_components.
#
voice_assistant:
  id: va
  microphone:
    microphone: i2s_mics                 # PodVoice: VERIFY data/data2 channel mapping (R7)
    # The official dev YAML passes a list of up to two channels here for dual-
    # channel streaming. VERIFY exact form against the dev YAML.
  # Output: PodVoice: speaker vs media_player is the Spike S2 decision (PLAN 4.5).
  # Wire ONE of these once S2 lands; they are mutually exclusive.
  # speaker: mixing_speaker              # PodVoice: Path 3 (raw PCM -> resampler -> mixer)
  # media_player: <id>                   # PodVoice: Path 2 (URL announce)
  use_wake_word: false                   # PodVoice: HA Assist does NOT drive wake; PodVoice does.
  micro_wake_word: mww                   # PodVoice: keep on-device mww available, but its
                                         #   on_wake_word_detected is redirected (see above) --
                                         #   VERIFY whether referencing it here re-arms HA wake;
                                         #   if so, drop this line and keep mww fully standalone.
  # PodVoice: STOCK firmware defines many lifecycle handlers here
  # (on_client_connected, on_error, on_listening, on_stt_vad_*, on_tts_*,
  # on_end, on_timer_*) that drive LEDs and the HA pipeline. For PodVoice these
  # are mostly IRRELEVANT (PodVoice, not HA, runs the conversation). Keep only
  # what you need for LED feedback; do NOT let them re-arm an HA pipeline.
  #
  # *** continuous gap-free audio mechanism (A/C/B) goes here / in
  #     external_components -- Phase-1 Spike S1 deliverable. NOT stock. ***

# external_components:
#   PodVoice: if Spike S1 lands on Option C (hold STREAMING_MICROPHONE) or
#   Option B (custom streamer), or Spike S2 lands on Path 3 (streamed PCM sink),
#   the custom component(s) are declared here. Pin the ESPHome version (PLAN R3)
#   to keep the fork stable against upstream voice_assistant.cpp churn.
#   - source: ...
