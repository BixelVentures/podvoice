    rmt_symbols: 192                     # from official dev YAML
    default_transition_length: 0ms       # from official dev YAML
    power_supply: led_power              # from official dev YAML -- VERIFY led_power is declared
  # VERIFY: copy the `partition` light + all effects + the control_leds script
