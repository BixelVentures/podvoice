# =============================================================================
# podvoice-phase1b-extend-test.yaml — !extend WITHOUT substitutions
# =============================================================================
# !extend failed twice. The known ESPHome bug (esphome/issues#4764) is that
# !extend breaks WHEN SUBSTITUTIONS ARE PRESENT. This test removes the
# substitutions block entirely (everything hardcoded) to isolate that:
#   - VALIDATES -> substitutions were the !extend-breaker. Full-duplex Phase 1b
#     is viable: we keep the overlay substitution-free.
#   - STILL "'!' cannot be used" -> !extend is unusable in this Builder. We go
#     half-duplex (Vej B): wake -> voice_assistant.start -> PodVoice handle_start,
#     no !extend, no podvoice_audio. Full-duplex stays in the Talk console.
# =============================================================================

packages:
  ha_voice:
    url: https://github.com/esphome/home-assistant-voice-pe
    files: [home-assistant-voice.yaml]
    ref: "26.6.0"
    refresh: 0s

esphome:
  name: podvoice-pe
  friendly_name: PodVoice PE

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret podvoice_api_key

# THE TEST: extend the upstream voice_assistant, now with NO substitutions present.
voice_assistant:
  id: !extend va
  use_wake_word: false
