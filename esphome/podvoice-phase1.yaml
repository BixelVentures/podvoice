# =============================================================================
# podvoice-phase1.yaml — Phase 0 base + podvoice_audio mic-forward (S1 test)
# =============================================================================
# Adds ONLY the continuous mic-forward component on top of the working Phase 0
# base, with autostart:true so it streams from boot — this isolates and tests the
# biggest unknown (S1: gap-free continuous audio) WITHOUT the wake/start plumbing
# or any !extend. Run Gate 2 (Audio stream) after flashing this.
#
# This is the FIRST hardware compile of the custom C++ component. If the build
# fails, the error names the ESPHome internal API that drifted — send it and it
# gets fixed. The component is fetched fresh from the repo (refresh: 0s).
# =============================================================================

substitutions:
  name: podvoice-pe
  friendly_name: PodVoice PE
  ha_voice_ref: "26.6.0"

packages:
  ha_voice:
    url: https://github.com/esphome/home-assistant-voice-pe
    files: [home-assistant-voice.yaml]
    ref: ${ha_voice_ref}
    refresh: 0s

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret podvoice_api_key

# The ONE custom piece: a passive tap on the already-running mic that forwards
# channel-0 (XMOS-AEC'd) audio to PodVoice as VoiceAssistantAudio over the API.
external_components:
  - source:
      type: git
      url: https://github.com/BixelVentures/podvoice
      ref: main
    components: [podvoice_audio]
    refresh: 0s

podvoice_audio:
  microphone:
    microphone: i2s_mics # upstream Voice PE mic id
    channels: [0] # channel 0 = XMOS-processed (AEC'd) mic
  ring_ms: 400
  autostart: true # S1 test: stream continuously from boot (no wake plumbing yet)
