# =============================================================================
# podvoice-phase0.yaml — MINIMAL Voice PE base (validates + flashes + connects)
# =============================================================================
# Goal: get a flashable base that PodVoice can REACH (Gate 1 / Connection).
# Deliberately contains NO `!extend` and NO custom component:
#   - upstream 26.6.0 already sets voice_assistant `use_wake_word: false`, so we
#     don't need to override it (that override is what triggered the "'!' cannot
#     be used" !extend error).
#   - the wake->event redirect + the podvoice_audio mic-forward both need !extend
#     on `mww`/`va`; those come back in Phase 1 once the base flashes cleanly.
# Only override = the API encryption key (so PodVoice connects with your PSK).
# =============================================================================

substitutions:
  name: podvoice-pe
  friendly_name: PodVoice PE
  ha_voice_ref: "26.6.0" # match your ESPHome (min 2026.5.0)

packages:
  ha_voice:
    url: https://github.com/esphome/home-assistant-voice-pe
    files: [home-assistant-voice.yaml]
    ref: ${ha_voice_ref}
    refresh: 1d # NOT never — never serves a stale cached base after a ref bump

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

# PodVoice connects over the native API with this Noise PSK
# (same value in PodVoice -> Settings/Voice PE -> Voice PE PSK).
api:
  encryption:
    key: !secret podvoice_api_key
