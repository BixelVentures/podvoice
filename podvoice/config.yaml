# PodVoice Home Assistant add-on manifest.
# Defaults below are the canonical operational constants from PLAN.md §3
# (single source of truth, mirrored in gatekeeper/constants.py).
name: PodVoice
version: "0.20.0"
slug: podvoice
description: Gemini Live voice assistant bridge for custom-firmware Voice PE
arch:
  - aarch64
startup: application
init: false
host_network: true
homeassistant_api: true   # SUPERVISOR_TOKEN for the HA tool bridge
hassio_api: true          # lets the panel "Save & restart" the add-on itself
# Sidebar panel served on :8098 (PodConnect owns :8099) behind HA Ingress.
ingress: true
ingress_port: 8098
panel_icon: mdi:microphone-message
panel_title: PodVoice
# Configuration holds ONLY the API keys. Everything else (provider, models,
# PodConnect URL/token, Voice-PE PSK, rooms, tuning, simulate) is edited in the
# panel's Settings page and stored in the add-on's /data (see settings.py).
options:
  gemini_api_key: ""
  openai_api_key: ""
schema:
  gemini_api_key: "password?"
  openai_api_key: "password?"
